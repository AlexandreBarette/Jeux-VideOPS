name: CI Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  demo_job:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bootstrap-app/bootstrap

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run eslint:check

      - name: Run unit tests
        run: npm test

      - name: Run coverage
        run: npm run nyc:run

      - name: Run functional tests
        run: npm run cypress:test

      - name: Generate documentation
        run: npm run jsdoc